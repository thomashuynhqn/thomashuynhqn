<svg xmlns="http://www.w3.org/2000/svg" width="400" height="200" viewBox="0 0 400 200">
  <!-- Background -->
  <rect width="400" height="200" fill="#0d1117"/>

  <!-- Left vertical line -->
  <line x1="100" y1="30" x2="100" y2="170" stroke="#818cf8" stroke-width="1.5" opacity="0.6"/>

  <!-- Right vertical line -->
  <line x1="300" y1="30" x2="300" y2="170" stroke="#818cf8" stroke-width="1.5" opacity="0.6"/>

  <!-- TH monogram -->
  <text x="200" y="105" text-anchor="middle" font-family="Georgia,'Times New Roman',Times,serif" font-weight="700" font-size="56" fill="#ffffff" letter-spacing="6">TH</text>

  <!-- Registered mark style dot -->
  <circle cx="248" cy="68" r="4" fill="#ec4899"/>

  <!-- Subtitle -->
  <text x="200" y="140" text-anchor="middle" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-weight="300" font-size="16" fill="#818cf8" letter-spacing="8">DEVELOPER</text>
</svg>
