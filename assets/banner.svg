<svg xmlns="http://www.w3.org/2000/svg" width="900" height="300" viewBox="0 0 900 300">
  <!-- Background -->
  <rect width="900" height="300" fill="#0d1117"/>

  <!-- Left vertical line -->
  <line x1="180" y1="40" x2="180" y2="260" stroke="#818cf8" stroke-width="1.5" opacity="0.4"/>

  <!-- Right vertical line -->
  <line x1="720" y1="40" x2="720" y2="260" stroke="#818cf8" stroke-width="1.5" opacity="0.4"/>

  <!-- TH monogram -->
  <text x="450" y="130" text-anchor="middle" font-family="Georgia,'Times New Roman',Times,serif" font-weight="700" font-size="72" fill="#ffffff" letter-spacing="8">TH</text>

  <!-- Pink accent dot -->
  <circle cx="510" cy="82" r="5" fill="#ec4899"/>

  <!-- Subtitle -->
  <text x="450" y="175" text-anchor="middle" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-weight="300" font-size="18" fill="#818cf8" letter-spacing="10">DEVELOPER</text>

  <!-- Tagline -->
  <text x="450" y="220" text-anchor="middle" font-family="Georgia,'Times New Roman',Times,serif" font-style="italic" font-weight="400" font-size="13" fill="#71717a">Project Manager &amp; Fullstack Developer</text>

  <!-- Bottom accent line -->
  <line x1="350" y1="250" x2="550" y2="250" stroke="#6366f1" stroke-width="1" opacity="0.3"/>
</svg>
