<svg xmlns="http://www.w3.org/2000/svg" width="900" height="300" viewBox="0 0 900 300">
  <style>
    @keyframes gradientMove {
      0% { stop-color: #6366f1; }
      33% { stop-color: #8b5cf6; }
      66% { stop-color: #ec4899; }
      100% { stop-color: #6366f1; }
    }
    @keyframes gradientMove2 {
      0% { stop-color: #ec4899; }
      33% { stop-color: #6366f1; }
      66% { stop-color: #8b5cf6; }
      100% { stop-color: #ec4899; }
    }
    @keyframes pulse {
      0%, 100% { opacity: 0.04; }
      50% { opacity: 0.08; }
    }
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-6px); }
    }
    .glow1 { animation: pulse 4s ease-in-out infinite; }
    .glow2 { animation: pulse 5s ease-in-out infinite 1s; }
    .name { font-family: 'Segoe UI','Helvetica Neue',Arial,sans-serif; font-weight: 800; font-size: 46px; fill: #ffffff; }
    .role { font-family: 'Segoe UI','Helvetica Neue',Arial,sans-serif; font-weight: 500; font-size: 17px; fill: #818cf8; }
    .tag { font-family: 'Segoe UI','Helvetica Neue',Arial,sans-serif; font-weight: 400; font-size: 13px; fill: #71717a; }
    .mono { font-family: 'Courier New',monospace; font-weight: 700; font-size: 36px; fill: #ffffff; }
    .accent-line-start { animation: gradientMove 6s ease-in-out infinite; }
    .accent-line-end { animation: gradientMove2 6s ease-in-out infinite; }
    .cat-float { animation: float 3s ease-in-out infinite; }
  </style>

  <!-- Background -->
  <rect width="900" height="300" fill="#0d1117" rx="12"/>

  <!-- Grid dots -->
  <g opacity="0.06">
    <circle cx="50" cy="50" r="1" fill="white"/><circle cx="100" cy="50" r="1" fill="white"/>
    <circle cx="150" cy="50" r="1" fill="white"/><circle cx="200" cy="50" r="1" fill="white"/>
    <circle cx="250" cy="50" r="1" fill="white"/><circle cx="300" cy="50" r="1" fill="white"/>
    <circle cx="350" cy="50" r="1" fill="white"/><circle cx="400" cy="50" r="1" fill="white"/>
    <circle cx="450" cy="50" r="1" fill="white"/><circle cx="500" cy="50" r="1" fill="white"/>
    <circle cx="550" cy="50" r="1" fill="white"/><circle cx="600" cy="50" r="1" fill="white"/>
    <circle cx="650" cy="50" r="1" fill="white"/><circle cx="700" cy="50" r="1" fill="white"/>
    <circle cx="750" cy="50" r="1" fill="white"/><circle cx="800" cy="50" r="1" fill="white"/>
    <circle cx="850" cy="50" r="1" fill="white"/>
    <circle cx="50" cy="100" r="1" fill="white"/><circle cx="100" cy="100" r="1" fill="white"/>
    <circle cx="150" cy="100" r="1" fill="white"/><circle cx="200" cy="100" r="1" fill="white"/>
    <circle cx="250" cy="100" r="1" fill="white"/><circle cx="300" cy="100" r="1" fill="white"/>
    <circle cx="350" cy="100" r="1" fill="white"/><circle cx="400" cy="100" r="1" fill="white"/>
    <circle cx="450" cy="100" r="1" fill="white"/><circle cx="500" cy="100" r="1" fill="white"/>
    <circle cx="550" cy="100" r="1" fill="white"/><circle cx="600" cy="100" r="1" fill="white"/>
    <circle cx="650" cy="100" r="1" fill="white"/><circle cx="700" cy="100" r="1" fill="white"/>
    <circle cx="750" cy="100" r="1" fill="white"/><circle cx="800" cy="100" r="1" fill="white"/>
    <circle cx="850" cy="100" r="1" fill="white"/>
    <circle cx="50" cy="150" r="1" fill="white"/><circle cx="100" cy="150" r="1" fill="white"/>
    <circle cx="150" cy="150" r="1" fill="white"/><circle cx="200" cy="150" r="1" fill="white"/>
    <circle cx="250" cy="150" r="1" fill="white"/><circle cx="300" cy="150" r="1" fill="white"/>
    <circle cx="350" cy="150" r="1" fill="white"/><circle cx="400" cy="150" r="1" fill="white"/>
    <circle cx="450" cy="150" r="1" fill="white"/><circle cx="500" cy="150" r="1" fill="white"/>
    <circle cx="550" cy="150" r="1" fill="white"/><circle cx="600" cy="150" r="1" fill="white"/>
    <circle cx="650" cy="150" r="1" fill="white"/><circle cx="700" cy="150" r="1" fill="white"/>
    <circle cx="750" cy="150" r="1" fill="white"/><circle cx="800" cy="150" r="1" fill="white"/>
    <circle cx="850" cy="150" r="1" fill="white"/>
    <circle cx="50" cy="200" r="1" fill="white"/><circle cx="100" cy="200" r="1" fill="white"/>
    <circle cx="150" cy="200" r="1" fill="white"/><circle cx="200" cy="200" r="1" fill="white"/>
    <circle cx="250" cy="200" r="1" fill="white"/><circle cx="300" cy="200" r="1" fill="white"/>
    <circle cx="350" cy="200" r="1" fill="white"/><circle cx="400" cy="200" r="1" fill="white"/>
    <circle cx="450" cy="200" r="1" fill="white"/><circle cx="500" cy="200" r="1" fill="white"/>
    <circle cx="550" cy="200" r="1" fill="white"/><circle cx="600" cy="200" r="1" fill="white"/>
    <circle cx="650" cy="200" r="1" fill="white"/><circle cx="700" cy="200" r="1" fill="white"/>
    <circle cx="750" cy="200" r="1" fill="white"/><circle cx="800" cy="200" r="1" fill="white"/>
    <circle cx="850" cy="200" r="1" fill="white"/>
    <circle cx="50" cy="250" r="1" fill="white"/><circle cx="100" cy="250" r="1" fill="white"/>
    <circle cx="150" cy="250" r="1" fill="white"/><circle cx="200" cy="250" r="1" fill="white"/>
    <circle cx="250" cy="250" r="1" fill="white"/><circle cx="300" cy="250" r="1" fill="white"/>
    <circle cx="350" cy="250" r="1" fill="white"/><circle cx="400" cy="250" r="1" fill="white"/>
    <circle cx="450" cy="250" r="1" fill="white"/><circle cx="500" cy="250" r="1" fill="white"/>
    <circle cx="550" cy="250" r="1" fill="white"/><circle cx="600" cy="250" r="1" fill="white"/>
    <circle cx="650" cy="250" r="1" fill="white"/><circle cx="700" cy="250" r="1" fill="white"/>
    <circle cx="750" cy="250" r="1" fill="white"/><circle cx="800" cy="250" r="1" fill="white"/>
    <circle cx="850" cy="250" r="1" fill="white"/>
  </g>

  <!-- Glow orbs -->
  <circle cx="140" cy="150" r="130" fill="#6366f1" class="glow1"/>
  <circle cx="760" cy="120" r="110" fill="#ec4899" class="glow2"/>

  <!-- Animated accent line at bottom -->
  <linearGradient id="accentLine" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0%" class="accent-line-start"/>
    <stop offset="100%" class="accent-line-end"/>
  </linearGradient>
  <rect x="0" y="294" width="900" height="6" fill="url(#accentLine)" rx="0"/>

  <!-- Logo area -->
  <g class="cat-float">
    <!-- Hexagon logo background -->
    <polygon points="150,80 195,105 195,155 150,180 105,155 105,105" fill="#6366f1" opacity="0.9"/>
    <polygon points="150,80 195,105 195,155 150,180 105,155 105,105" fill="none" stroke="#818cf8" stroke-width="1.5" opacity="0.4"/>

    <!-- Code brackets < /> inside hexagon -->
    <text x="123" y="143" font-family="'Courier New',monospace" font-weight="700" font-size="18" fill="white" opacity="0.4">&lt;</text>
    <text x="133" y="143" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-weight="800" font-size="28" fill="white">TH</text>
    <text x="170" y="143" font-family="'Courier New',monospace" font-weight="700" font-size="18" fill="white" opacity="0.4">/&gt;</text>

    <!-- Cat ears on hexagon -->
    <polygon points="118,88 108,64 132,82" fill="#6366f1"/>
    <polygon points="118,88 108,64 132,82" fill="none" stroke="#818cf8" stroke-width="1" opacity="0.4"/>
    <polygon points="182,88 192,64 168,82" fill="#6366f1"/>
    <polygon points="182,88 192,64 168,82" fill="none" stroke="#818cf8" stroke-width="1" opacity="0.4"/>

    <!-- Pink accent dot -->
    <circle cx="196" cy="92" r="5" fill="#ec4899"/>
  </g>

  <!-- Text content -->
  <text x="310" y="122" class="name">Thomas Huynh</text>
  <text x="310" y="155" class="role">Project Manager &amp; Fullstack Developer</text>
  <text x="310" y="190" class="tag">Year of the Cat · Libra · land on your feet, then ship it</text>

  <!-- Small tech icons as text -->
  <g opacity="0.3">
    <text x="310" y="230" font-family="'Courier New',monospace" font-size="11" fill="#818cf8">TypeScript</text>
    <text x="395" y="230" font-family="'Courier New',monospace" font-size="11" fill="#818cf8">React</text>
    <text x="450" y="230" font-family="'Courier New',monospace" font-size="11" fill="#818cf8">Next.js</text>
    <text x="520" y="230" font-family="'Courier New',monospace" font-size="11" fill="#818cf8">Node.js</text>
    <text x="590" y="230" font-family="'Courier New',monospace" font-size="11" fill="#818cf8">NestJS</text>
  </g>

  <!-- Border -->
  <rect width="900" height="300" fill="none" stroke="white" stroke-opacity="0.05" stroke-width="1" rx="12"/>
</svg>
