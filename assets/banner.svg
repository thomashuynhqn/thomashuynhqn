<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 300" width="900" height="300">
  <defs>
    <linearGradient id="bannerBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="100%" style="stop-color:#161b22"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="50%" style="stop-color:#8b5cf6"/>
      <stop offset="100%" style="stop-color:#ec4899"/>
    </linearGradient>
    <linearGradient id="logoBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="300" fill="url(#bannerBg)" rx="16"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.03" stroke="white" stroke-width="1">
    <line x1="0" y1="60" x2="900" y2="60"/>
    <line x1="0" y1="120" x2="900" y2="120"/>
    <line x1="0" y1="180" x2="900" y2="180"/>
    <line x1="0" y1="240" x2="900" y2="240"/>
    <line x1="150" y1="0" x2="150" y2="300"/>
    <line x1="300" y1="0" x2="300" y2="300"/>
    <line x1="450" y1="0" x2="450" y2="300"/>
    <line x1="600" y1="0" x2="600" y2="300"/>
    <line x1="750" y1="0" x2="750" y2="300"/>
  </g>

  <!-- Glow orbs -->
  <circle cx="150" cy="150" r="120" fill="#6366f1" opacity="0.04" filter="url(#glow)"/>
  <circle cx="750" cy="100" r="100" fill="#ec4899" opacity="0.03" filter="url(#glow)"/>

  <!-- Accent line bottom -->
  <rect x="0" y="294" width="900" height="6" fill="url(#accentGrad)" rx="3"/>

  <!-- Logo circle -->
  <circle cx="150" cy="140" r="56" fill="url(#logoBg)"/>
  <circle cx="150" cy="140" r="56" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="1.5"/>

  <!-- TH in logo -->
  <text x="150" y="155" text-anchor="middle" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-weight="800" font-size="40" fill="white" letter-spacing="-2">TH</text>

  <!-- Pink dot -->
  <circle cx="185" cy="100" r="4" fill="#ec4899"/>

  <!-- Cat ears on logo -->
  <polygon points="115,96 107,78 123,90" fill="url(#logoBg)" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
  <polygon points="185,96 193,78 177,90" fill="url(#logoBg)" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>

  <!-- Name -->
  <text x="320" y="125" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-weight="800" font-size="48" fill="white" letter-spacing="-1">Thomas Huynh</text>

  <!-- Role -->
  <text x="320" y="165" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-weight="400" font-size="18" fill="#818cf8">Project Manager &amp; Fullstack Developer</text>

  <!-- Tag line -->
  <text x="320" y="200" font-family="'JetBrains Mono','Fira Code',monospace" font-weight="400" font-size="13" fill="#71717a">cat 🐱 · libra ♎ · land on your feet, then ship it 🐾</text>

  <!-- Border -->
  <rect width="900" height="300" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="1" rx="16"/>
</svg>
